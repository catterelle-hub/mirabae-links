<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mirabae</title>
  <meta name="description" content="Brain & Beauty Rituals That Work. Peak brain. Glow skin. Healthy body." />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #0A0A0A;
      --gold:   #B8986A;
      --gold-lt:#D4B48A;
      --cream:  #F6F0E7;
      --muted:  #8A8278;
      --white:  #FFFFFF;
    }

    html, body {
      min-height: 100vh;
      background: var(--black);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body {
      padding: 48px 24px 64px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── LOGO ── */
    .logo-wrap {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: var(--black);
      border: 1.5px solid rgba(184,152,106,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    /* ── BRAND NAME ── */
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--white);
      text-align: center;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      margin-bottom: 36px;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 32px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin-bottom: 36px;
    }

    /* ── LINKS ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-card {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 22px;
      border: 1px solid rgba(184,152,106,0.25);
      border-radius: 4px;
      text-decoration: none;
      background: rgba(255,255,255,0.03);
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(184,152,106,0.06) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .link-card:hover {
      border-color: rgba(184,152,106,0.55);
      background: rgba(255,255,255,0.05);
      transform: translateY(-1px);
    }

    .link-card:hover::before {
      opacity: 1;
    }

    .link-card:active {
      transform: translateY(0);
    }

    .card-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
      width: 28px;
      text-align: center;
    }

    .card-text {
      flex: 1;
    }

    .card-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      display: block;
      margin-bottom: 3px;
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--white);
      display: block;
      letter-spacing: 0.02em;
    }

    .card-arrow {
      font-size: 0.75rem;
      color: var(--muted);
      flex-shrink: 0;
      transition: color 0.2s, transform 0.2s;
    }

    .link-card:hover .card-arrow {
      color: var(--gold);
      transform: translateX(3px);
    }

    /* Featured card (Appetite Recode) */
    .link-card.featured {
      border-color: rgba(184,152,106,0.5);
      background: rgba(184,152,106,0.07);
    }

    .link-card.featured .card-label {
      color: var(--gold-lt);
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 40px;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      text-align: center;
    }

    /* ── MOBILE FINE-TUNE ── */
    @media (max-width: 390px) {
      .brand-name { font-size: 1.75rem; }
      .link-card { padding: 16px 18px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Logo -->
    <div class="logo-wrap">
      <img src="https://www.mirabae.com/cdn/shop/files/mirabae-logo-avatar.jpg"
           alt="Mirabae"
           onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=\'font-family:Cormorant Garamond,serif;color:#B8986A;font-size:1.4rem;letter-spacing:0.1em\'>M</span>';" />
    </div>

    <!-- Brand -->
    <div class="brand-name">Mirabae</div>
    <div class="tagline">The future of beauty is neural.</div>
    <div class="divider"></div>

    <!-- Links -->
    <div class="links">

      <!-- Appetite Recode — featured -->
      <a class="link-card featured" href="https://whop.com/mirabae-0696/the-appetite-recode" target="_blank" rel="noopener">
        <div class="card-icon">📖</div>
        <div class="card-text">
          <span class="card-label">New Release</span>
          <span class="card-title">The Appetite Recode</span>
        </div>
        <div class="card-arrow">→</div>
      </a>

      <!-- Brainelle -->
      <a class="link-card" href="https://brainelle.carrd.co" target="_blank" rel="noopener">
        <div class="card-icon">✦</div>
        <div class="card-text">
          <span class="card-label">Pre-Order Now</span>
          <span class="card-title">Brainelle · Brain & Beauty Elixir</span>
        </div>
        <div class="card-arrow">→</div>
      </a>

      <!-- Anima -->
      <a class="link-card" href="https://anima.mirabae.com" target="_blank" rel="noopener">
        <div class="card-icon">🌿</div>
        <div class="card-text">
          <span class="card-label">Pre-Order Now</span>
          <span class="card-title">Anima · Kefir Fibre Powder</span>
        </div>
        <div class="card-arrow">→</div>
      </a>

      <!-- Shop -->
      <a class="link-card" href="https://www.mirabae.com" target="_blank" rel="noopener">
        <div class="card-icon">◎</div>
        <div class="card-text">
          <span class="card-label">Shop All Supplements</span>
          <span class="card-title">Magnesium · Matcha · Lion's Mane · Omega</span>
        </div>
        <div class="card-arrow">→</div>
      </a>

    </div>

    <div class="footer">© 2026 Mirabae &nbsp;·&nbsp; The future of beauty is neural.</div>

  </div>
</body>
</html>
