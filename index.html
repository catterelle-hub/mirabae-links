  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #0A0A0A; --gold: #B8986A; --gold-lt: #D4B48A; --muted: #8A8278; --white: #FFFFFF; }
    html, body { min-height: 100vh; background: var(--black); color: var(--white); font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; }
    body { padding: 48px 24px 64px; }
    .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }
    .logo-wrap { width: 88px; height: 88px; border-radius: 50%; border: 1.5px solid rgba(184,152,106,0.45); overflow: hidden; margin-bottom: 18px; }
    .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 500; letter-spacing: 0.14em; color: var(--white); text-align: center; margin-bottom: 6px; }
    .tagline { font-size: 0.62rem; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); text-align: center; margin-bottom: 32px; }
    .divider { width: 32px; height: 1px; background: var(--gold); opacity: 0.4; margin-bottom: 32px; }
    .links { width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .link-card { width: 100%; display: flex; align-items: center; gap: 16px; padding: 17px 20px; border: 1px solid rgba(184,152,106,0.2); border-radius: 4px; text-decoration: none; background: rgba(255,255,255,0.025); transition: background 0.2s, border-color 0.2s, transform 0.15s; }
    .link-card.featured { border-color: rgba(184,152,106,0.5); background: rgba(184,152,106,0.07); }
    .link-card:hover { border-color: rgba(184,152,106,0.55); background: rgba(255,255,255,0.05); transform: translateY(-1px); }
    .link-card:active { transform: translateY(0); }
    .card-icon { font-size: 1.1rem; flex-shrink: 0; width: 26px; text-align: center; }
    .card-text { flex: 1; }
    .card-label { display: block; font-size: 0.58rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 3px; }
    .card-title { display: block; font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 500; color: var(--white); letter-spacing: 0.02em; }
    .card-arrow { font-size: 0.9rem; color: rgba(255,255,255,0.25); flex-shrink: 0; transition: color 0.2s, transform 0.2s; }
    .link-card:hover .card-arrow { color: var(--gold); transform: translateX(3px); }
    .footer { margin-top: 40px; font-size: 0.56rem; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.18); text-align: center; }
    @media (max-width: 390px) { .brand-name { font-size: 1.75rem; } .link-card { padding: 15px 16px; } }
  </style>
</head>
<body>
